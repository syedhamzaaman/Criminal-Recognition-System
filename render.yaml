services:
  - type: web
    name: criminal-recognition-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python download_models.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.2"
